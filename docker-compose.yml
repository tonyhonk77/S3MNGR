version: '3.8'

services:
  s3-manager:
    build: .
    container_name: s3-manager
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./data:/data
      - ./logs:/var/log/nginx
      - ./profiles:/app/profiles
      - /tmp/nginx_client_body_temp:/tmp/nginx_client_body_temp
    environment:
      - TZ=UTC
      - SECRET_KEY=your-secret-key-here
    networks:
      - s3-network

networks:
  s3-network:
    driver: bridge